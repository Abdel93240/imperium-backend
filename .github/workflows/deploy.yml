name: Test and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: imperium_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: imperium_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imperium_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      IMPERIUM_TEST_DATABASE_URL: postgresql+psycopg://imperium_user:test_password@localhost:5432/imperium_core_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://imperium_user:test_password@localhost:5432/imperium_core_test
        run: alembic upgrade head
      - name: Run tests (pytest)
        working-directory: backend
        run: pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 12m
          script: |
            bash /opt/imperium/scripts/deploy.sh
