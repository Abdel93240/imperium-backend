# Imperium docs catalog — structured index (parsable + human-readable)
#
# WHY: docs are numbered chronologically (creation order), not thematically.
# This catalog adds a thematic/logical layer WITHOUT renaming files (which would
# break ~700 cross-references). Files keep their stable NN_ / FNN_ names; this
# catalog gives the logical view (category, order-within-category, status,
# version, source-of-truth, dependencies).
#
# RELATION TO OTHER META DOCS:
#   00_DOCS_MASTER_INDEX.md  -> narrative "why" (decisions, cleanup history). Prose.
#   _CATALOG.yaml (this file) -> structured "what/where" (classification, status). Parsable.
#   99_REGLES_NOMENCLATURE_DOCS.md -> naming rules (NN_ architecture vs FNN_ features).
#
# STATUS values:
#   up_to_date      -> reviewed and current
#   needs_alignment -> known to carry stale content (e.g. old model hierarchy)
#   to_review       -> not yet reviewed in the current pass
#   deprecated      -> superseded, kept for history
#
# FAMILY values: architecture | feature | meta
#
# MAINTENANCE: every new doc must get an entry here. Keep status accurate.
# During the full re-read, each doc moves from to_review to its real status.

